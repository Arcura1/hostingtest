<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(20px);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            --text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        body {
            background: linear-gradient(135deg, #0d6efd 0%, #6f42c1 50%, #0dcaf0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            padding: 20px;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 650px;
            animation: fadeInCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .word-display {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: var(--text-shadow);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .answer-section {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: opacity 0.4s ease, max-height 0.4s ease, transform 0.4s ease;
            transform: translateY(10px);
        }

        .answer-section.show {
            opacity: 1;
            max-height: 300px;
            transform: translateY(0);
        }

        .meaning-text {
            font-size: 1.75rem;
            font-weight: 600;
            color: #ffe600;
            text-shadow: var(--text-shadow);
        }

        .example-text {
            font-style: italic;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            font-weight: 600;
            backdrop-filter: var(--glass-blur);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-glass:active {
            transform: translateY(1px);
        }

        .recent-section {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 1.5rem;
            margin-top: 2rem;
        }

        .recent-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .recent-item {
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.75);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            display: inline-block;
        }

        .recent-item:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(3px);
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes fadeInCard {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 576px) {
            .word-display {
                font-size: 2.5rem;
            }
            .glass-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <main class="glass-card container-fluid text-center">
        <header>
            <h1 class="h5 text-uppercase tracking-wider text-white-50 mb-4">English Vocabulary</h1>
        </header>

        <section class="my-5">
            <div id="wordDisplay" class="word-display mb-4">...</div>
            
            <div id="answerSection" class="answer-section mb-4">
                <p id="meaningDisplay" class="meaning-text mb-2"></p>
                <p id="exampleDisplay" class="example-text px-3"></p>
            </div>
        </section>

        <section class="row g-3 justify-content-center mb-4">
            <div class="col-6 col-sm-5">
                <button id="btnShow" class="btn btn-glass w-100 py-2.5">Show Answer</button>
            </div>
            <div class="col-6 col-sm-5">
                <button id="btnNext" class="btn btn-glass w-100 py-2.5">Next Random Word</button>
            </div>
        </section>

        <footer class="recent-section text-start">
            <h2 class="h6 text-white-50 mb-3">Recent Words</h2>
            <ul id="recentList" class="recent-list d-flex flex-column gap-1">
                <!-- Recent items injected dynamically -->
            </ul>
        </footer>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let allWords = [];
            let availableWords = [];
            let currentWord = null;
            let recentWords = [];

            const wordDisplay = document.getElementById('wordDisplay');
            const answerSection = document.getElementById('answerSection');
            const meaningDisplay = document.getElementById('meaningDisplay');
            const exampleDisplay = document.getElementById('exampleDisplay');
            
            const btnShow = document.getElementById('btnShow');
            const btnNext = document.getElementById('btnNext');
            const recentList = document.getElementById('recentList');

            const init = async () => {
                try {
                    const response = await fetch('words.json');
                    allWords = await response.json();
                    if (allWords.length > 0) {
                        resetPool();
                        showNextWord();
                    } else {
                        wordDisplay.textContent = "No words found.";
                    }
                } catch (error) {
                    console.error("Error loading words.json:", error);
                    wordDisplay.textContent = "Error loading data.";
                }
                setupEventListeners();
            };

            const resetPool = () => {
                availableWords = [...allWords];
                shuffleArray(availableWords);
            };

            const shuffleArray = (array) => {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            };

            const showNextWord = () => {
                if (allWords.length === 0) return;

                if (availableWords.length === 0) {
                    resetPool();
                    if (currentWord && availableWords[availableWords.length - 1].word === currentWord.word && availableWords.length > 1) {
                        const lastIndex = availableWords.length - 1;
                        const swapIndex = Math.floor(Math.random() * lastIndex);
                        [availableWords[lastIndex], availableWords[swapIndex]] = [availableWords[swapIndex], availableWords[lastIndex]];
                    }
                }

                let nextIndex = availableWords.length - 1;
                if (currentWord && availableWords[nextIndex].word === currentWord.word && availableWords.length > 1) {
                    nextIndex = availableWords.length - 2;
                }

                const selected = availableWords.splice(nextIndex, 1)[0];
                renderWord(selected);
            };

            const renderWord = (wordObj) => {
                wordDisplay.classList.add('fade-out');
                hideAnswer();

                setTimeout(() => {
                    if (currentWord) {
                        updateRecentWords(currentWord);
                    }
                    currentWord = wordObj;
                    wordDisplay.textContent = currentWord.word;
                    meaningDisplay.textContent = currentWord.meaning;
                    exampleDisplay.textContent = currentWord.example;
                    wordDisplay.classList.remove('fade-out');
                }, 300);
            };

            const showAnswer = () => {
                if (!currentWord) return;
                answerSection.classList.add('show');
            };

            const hideAnswer = () => {
                answerSection.classList.remove('show');
            };

            const updateRecentWords = (wordObj) => {
                recentWords = recentWords.filter(item => item.word !== wordObj.word);
                recentWords.unshift(wordObj);

                if (recentWords.length > 5) {
                    recentWords.pop();
                }
                renderRecentList();
            };

            const renderRecentList = () => {
                recentList.innerHTML = '';
                recentWords.forEach(wordObj => {
                    const li = document.createElement('li');
                    li.className = 'recent-item';
                    li.textContent = `• ${wordObj.word}`;
                    li.addEventListener('click', () => renderWord(wordObj));
                    recentList.appendChild(li);
                });
            };

            const setupEventListeners = () => {
                btnShow.addEventListener('click', showAnswer);
                btnNext.addEventListener('click', showNextWord);

                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        showAnswer();
                    } else if (e.code === 'Enter') {
                        e.preventDefault();
                        showNextWord();
                    } else if (e.code === 'Escape') {
                        e.preventDefault();
                        hideAnswer();
                    }
                });
            };

            init();
        });
    </script>
</body>
</html>
